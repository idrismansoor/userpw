<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Credentials Manager</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .controls { position: sticky; top: 0; background: white; padding: 10px; border-bottom: 1px solid #ccc; z-index: 1000; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        input { width: 90%; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="loadData()">Sync Data</button>
        <button onclick="addRow()">+ Add New Company</button>
        <button onclick="saveData()">Save All Changes</button>
    </div>
    <table>
        <thead><tr><th>SL</th><th>Company</th><th>User</th><th>Password</th><th>Note</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwzpaE0tXklca2Nv2pSDwzWzcwnG2O0j09iQMfxnIRirSqlA16sXuKEA3opoSf3KHjaxA/exec"; 

        async function loadData() {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.rows.map((r, i) => createRow(r, i)).join('');
        }

        function createRow(r = {company:'', user:'', password:'', note:''}, i) {
            return `<tr><td>${i+1}</td>
                <td><input value="${r.company}" class="c"></td>
                <td><input value="${r.user}" class="u"></td>
                <td><input value="${r.password}" class="p"></td>
                <td><input value="${r.note}" class="n"></td></tr>`;
        }

        function addRow() {
            const tbody = document.getElementById('tableBody');
            const index = tbody.rows.length;
            tbody.insertAdjacentHTML('beforeend', createRow(undefined, index));
        }

        async function saveData() {
            const rows = [];
            document.querySelectorAll('#tableBody tr').forEach(tr => {
                rows.push({
                    company: tr.querySelector('.c').value,
                    user: tr.querySelector('.u').value,
                    password: tr.querySelector('.p').value,
                    note: tr.querySelector('.n').value
                });
            });
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({action: 'save', rows}) });
            alert('Saved Successfully!');
        }
        
        loadData(); // Page load holei data load hobe
    </script>
</body>
</html>
