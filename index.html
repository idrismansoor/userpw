<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOS KHO - User Password Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #16213e, #0f3460);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 2px solid #e94560;
  }
  header h1 { font-size: 1.3rem; color: #e94560; }
  header span { font-size: 0.85rem; color: #aaa; }

  .toolbar {
    background: #16213e;
    padding: 12px 20px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid #2a2a4a;
  }
  .toolbar input[type="text"] {
    flex: 1; min-width: 180px;
    padding: 8px 12px; border: 1px solid #3a3a5a;
    border-radius: 6px; background: #0f3460; color: #fff; font-size: 0.9rem;
  }
  .toolbar input::placeholder { color: #888; }

  button {
    padding: 8px 16px; border: none; border-radius: 6px;
    cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.2s;
  }
  .btn-add { background: #e94560; color: #fff; }
  .btn-add:hover { background: #c73652; }
  .btn-save { background: #27ae60; color: #fff; }
  .btn-save:hover { background: #1e8449; }
  .btn-reload { background: #2980b9; color: #fff; }
  .btn-reload:hover { background: #1a6a99; }

  #status {
    padding: 8px 20px; font-size: 0.82rem; min-height: 30px;
    background: #12122a; color: #aaa; border-bottom: 1px solid #2a2a4a;
  }
  #status.ok { color: #2ecc71; }
  #status.err { color: #e74c3c; }
  #status.loading { color: #f39c12; }

  .search-bar {
    padding: 10px 20px; background: #16213e;
    border-bottom: 1px solid #2a2a4a;
  }
  .search-bar input {
    width: 100%; padding: 8px 12px; border: 1px solid #3a3a5a;
    border-radius: 6px; background: #0f3460; color: #fff; font-size: 0.9rem;
  }

  table {
    width: 100%; border-collapse: collapse; font-size: 0.88rem;
  }
  thead { background: #0f3460; position: sticky; top: 0; z-index: 10; }
  thead th {
    padding: 10px 12px; text-align: left; color: #e94560;
    font-weight: bold; border-bottom: 2px solid #e94560;
  }
  tbody tr { border-bottom: 1px solid #2a2a4a; transition: background 0.15s; }
  tbody tr:hover { background: #1e1e3a; }
  tbody td { padding: 8px 12px; vertical-align: middle; }

  .editable {
    background: transparent; border: none; color: #eee;
    font-size: 0.88rem; width: 100%; font-family: Arial, sans-serif;
    padding: 2px 4px; border-radius: 4px;
  }
  .editable:focus {
    outline: 1px solid #e94560; background: #0f3460;
  }

  .pw-cell { position: relative; }
  .pw-text { font-family: monospace; letter-spacing: 0.05em; }
  .toggle-pw {
    background: none; border: none; color: #e94560;
    cursor: pointer; padding: 2px 6px; font-size: 0.75rem;
    border-radius: 3px; transition: 0.15s;
  }
  .toggle-pw:hover { background: #e9456022; }

  .btn-del {
    background: none; border: 1px solid #e94560; color: #e94560;
    padding: 4px 10px; font-size: 0.78rem; border-radius: 4px;
  }
  .btn-del:hover { background: #e94560; color: #fff; }

  .badge {
    background: #e94560; color: #fff; border-radius: 10px;
    font-size: 0.72rem; padding: 2px 7px; margin-left: 6px;
  }

  #table-wrap { overflow-x: auto; }

  .empty-msg {
    text-align: center; padding: 40px; color: #555; font-size: 0.95rem;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🔐 TOS KHO Password Manager</h1>
    <span>Google Sheets এ সংযুক্ত — সব device এ sync হবে</span>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="inp-company" placeholder="কোম্পানির নাম" />
  <input type="text" id="inp-user" placeholder="Username / Email" />
  <input type="text" id="inp-pw" placeholder="Password" />
  <input type="text" id="inp-note" placeholder="Note (ঐচ্ছিক)" />
  <button class="btn-add" onclick="addRow()">➕ যোগ করুন</button>
  <button class="btn-save" onclick="saveToSheets()">💾 Sheets এ Save</button>
  <button class="btn-reload" onclick="loadFromSheets()">🔄 Reload</button>
</div>

<div id="status" class="loading">⏳ Google Sheets থেকে data load হচ্ছে...</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="🔍 কোম্পানি বা username খুঁজুন..." oninput="renderTable()" />
</div>

<div id="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>কোম্পানি</th>
        <th>Username / Email</th>
        <th>Password</th>
        <th>Note</th>
        <th>মুছুন</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty-msg" class="empty-msg" style="display:none">কোনো entry নেই। উপরে যোগ করুন।</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxX9odOf2AKtPFVLylDTfCyjbbdPPekNyx-Baeo2o5-QcOgZo-X6kpTOBjCOHv7vxMl_Q/exec";

let rows = []; // [{company, user, password, note}]
let showPw = {}; // index -> bool

function setStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = type || "";
}

// ── LOAD FROM SHEETS ────────────────────────────────
async function loadFromSheets() {
  setStatus("⏳ Google Sheets থেকে data load হচ্ছে...", "loading");
  try {
    const res = await fetch(API_URL, { redirect: "follow" });
    const data = await res.json();
    if (data.status === "ok") {
      rows = data.rows;
      localStorage.setItem("tosKhoBackup", JSON.stringify(rows));
      setStatus("✅ " + rows.length + " টি entry load হয়েছে — Google Sheets সংযুক্ত", "ok");
    } else {
      throw new Error("API error");
    }
  } catch (e) {
    // Fallback: localStorage
    const backup = localStorage.getItem("tosKhoBackup");
    if (backup) {
      rows = JSON.parse(backup);
      setStatus("⚠️ Sheets সংযোগ ব্যর্থ — local backup থেকে " + rows.length + " entry দেখাচ্ছে", "err");
    } else {
      rows = [];
      setStatus("⚠️ Sheets সংযোগ ব্যর্থ — নতুন entry যোগ করুন", "err");
    }
  }
  renderTable();
}

// ── SAVE TO SHEETS ───────────────────────────────────
async function saveToSheets() {
  setStatus("⏳ Google Sheets এ save হচ্ছে...", "loading");
  try {
    const payload = {
      action: "save",
      rows: rows.map((r, i) => [i + 1, r.company, r.user, r.password, r.note])
    };
    const res = await fetch(API_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.status === "ok") {
      localStorage.setItem("tosKhoBackup", JSON.stringify(rows));
      setStatus("✅ " + rows.length + " টি entry Google Sheets এ save হয়েছে!", "ok");
    } else throw new Error();
  } catch (e) {
    localStorage.setItem("tosKhoBackup", JSON.stringify(rows));
    setStatus("⚠️ Sheets save ব্যর্থ — local এ save হয়েছে। পরে আবার চেষ্টা করুন।", "err");
  }
}

// ── ADD ROW ──────────────────────────────────────────
function addRow() {
  const company = document.getElementById("inp-company").value.trim();
  const user = document.getElementById("inp-user").value.trim();
  const pw = document.getElementById("inp-pw").value.trim();
  const note = document.getElementById("inp-note").value.trim();
  if (!company && !user) {
    setStatus("❌ কোম্পানি বা username দিন!", "err");
    return;
  }
  rows.push({ company, user, password: pw, note });
  ["inp-company","inp-user","inp-pw","inp-note"].forEach(id => document.getElementById(id).value = "");
  renderTable();
  setStatus("✅ যোগ হয়েছে! Sheets এ save করতে 💾 বাটন চাপুন।", "ok");
}

// ── DELETE ROW ───────────────────────────────────────
function deleteRow(idx) {
  if (!confirm("এই entry মুছবেন?")) return;
  rows.splice(idx, 1);
  renderTable();
  setStatus("🗑️ মুছে গেছে। Sheets এ save করতে 💾 বাটন চাপুন।", "ok");
}

// ── INLINE EDIT ──────────────────────────────────────
function editField(idx, field, value) {
  rows[idx][field] = value;
}

// ── RENDER ───────────────────────────────────────────
function renderTable() {
  const q = document.getElementById("search").value.toLowerCase();
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const filtered = rows.map((r, i) => ({ ...r, _idx: i }))
    .filter(r => !q || r.company.toLowerCase().includes(q) || r.user.toLowerCase().includes(q) || r.note.toLowerCase().includes(q));

  document.getElementById("empty-msg").style.display = filtered.length === 0 ? "block" : "none";

  filtered.forEach((r, fi) => {
    const i = r._idx;
    const shown = showPw[i];
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="color:#888;font-size:0.8rem">${fi + 1}</td>
      <td><input class="editable" value="${esc(r.company)}" oninput="editField(${i},'company',this.value)" /></td>
      <td><input class="editable" value="${esc(r.user)}" oninput="editField(${i},'user',this.value)" /></td>
      <td class="pw-cell">
        <span class="pw-text">${shown ? esc(r.password) : "••••••••"}</span>
        <button class="toggle-pw" onclick="togglePw(${i})">${shown ? "🙈" : "👁️"}</button>
        <button class="toggle-pw" onclick="copyText('${esc(r.password)}')" title="Copy">📋</button>
      </td>
      <td><input class="editable" value="${esc(r.note)}" oninput="editField(${i},'note',this.value)" /></td>
      <td><button class="btn-del" onclick="deleteRow(${i})">🗑️</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function togglePw(i) {
  showPw[i] = !showPw[i];
  renderTable();
}

function copyText(txt) {
  navigator.clipboard.writeText(txt).then(() => setStatus("📋 Copy হয়েছে!", "ok"));
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
}

// ── INIT ─────────────────────────────────────────────
loadFromSheets();
</script>
</body>
</html>
