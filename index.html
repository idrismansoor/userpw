<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>TOS KHOR</title>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-900">TOS KHOR</h1>
            <div class="space-x-2">
                <button class="bg-blue-100 text-blue-700 px-4 py-2 rounded">TOS Login</button>
                <button class="bg-gray-200 px-4 py-2 rounded">Logout</button>
            </div>
        </div>

        <div class="flex gap-4 mb-4">
            <input type="text" id="searchInput" placeholder="Search by company name, username, or notes..." 
                   class="border p-2 w-full rounded shadow-sm" onkeyup="filterTable()">
            <button onclick="addRow()" class="bg-blue-600 text-white px-6 py-2 rounded shadow">+ Add New</button>
        </div>

        <div class="bg-white shadow rounded-lg overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b">
                    <tr><th class="p-4">Company Name</th><th class="p-4">Username</th><th class="p-4">Password</th><th class="p-4">Notes</th><th class="p-4">Actions</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="fixed bottom-0 left-0 w-full p-4 bg-white border-t shadow-lg flex justify-center">
            <button onclick="saveData()" class="bg-green-600 text-white px-10 py-3 rounded font-bold text-lg">Save All Changes</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "YOUR_NEW_DEPLOYMENT_URL_HERE";

        async function loadData() {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            document.getElementById('tableBody').innerHTML = data.rows.map(r => createRowHTML(r)).join('');
        }

        function createRowHTML(r) {
            return `<tr class="border-b">
                <td class="p-4"><input value="${r.company}" class="c w-full p-1 border"></td>
                <td class="p-4"><input value="${r.user}" class="u w-full p-1 border"></td>
                <td class="p-4"><input value="${r.password}" class="p w-full p-1 border"></td>
                <td class="p-4"><input value="${r.note}" class="n w-full p-1 border"></td>
                <td class="p-4"><button onclick="this.closest('tr').remove()" class="text-red-600 font-bold">Delete</button></td>
            </tr>`;
        }

        function addRow() {
            const tbody = document.getElementById('tableBody');
            tbody.insertAdjacentHTML('afterbegin', createRowHTML({company:'', user:'', password:'', note:''}));
        }

        function filterTable() {
            const val = document.getElementById("searchInput").value.toLowerCase();
            document.querySelectorAll("#tableBody tr").forEach(tr => {
                tr.style.display = tr.innerText.toLowerCase().includes(val) ? "" : "none";
            });
        }

        async function saveData() {
            const rows = Array.from(document.querySelectorAll('#tableBody tr')).map(tr => ({
                company: tr.querySelector('.c').value, user: tr.querySelector('.u').value,
                password: tr.querySelector('.p').value, note: tr.querySelector('.n').value
            }));
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({action: 'save', rows}) });
            alert('Saved Successfully!');
        }
        loadData();
    </script>
</body>
</html>
