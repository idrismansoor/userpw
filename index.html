<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USER PW LIST V.1</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PW LIST">
<meta name="theme-color" content="#1a1a2e">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;font-size:15px;}

/* ── STICKY TOP WRAPPER ── */
#sticky-top{position:sticky;top:0;z-index:100;}

/* ── HEADER ── */
header{background:linear-gradient(135deg,#16213e,#0f3460);border-bottom:2px solid #e94560;padding:10px 16px;}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.header-top h1{font-size:1.2rem;color:#e94560;font-weight:bold;}
.header-top .byline{font-size:0.75rem;color:#aaa;}
.header-right{display:flex;gap:6px;align-items:center;}
.icon-btn{background:#0f3460;border:1px solid #2a2a4a;color:#eee;border-radius:7px;padding:6px 11px;cursor:pointer;font-size:0.82rem;transition:.2s;white-space:nowrap;}
.icon-btn:hover{border-color:#e94560;color:#e94560;}

/* ── QUICK LINKS IN HEADER ── */
#quicklinks{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:4px 0 2px 0;}
#quicklinks span{color:#aaa;font-size:0.75rem;margin-right:2px;}
#quicklinks a{color:#7ec8e3;font-size:0.8rem;text-decoration:none;padding:3px 10px;border:1px solid #2a3a5a;border-radius:12px;white-space:nowrap;transition:.2s;}
#quicklinks a:hover{background:#e94560;color:#fff;border-color:#e94560;}

/* ── TOOLBAR ── */
.toolbar{background:#16213e;padding:10px 14px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #2a2a4a;}
.toolbar input{flex:1;min-width:130px;padding:9px 11px;border:1px solid #2a2a4a;border-radius:7px;background:#0f3460;color:#eee;font-size:0.95rem;}
.toolbar input::placeholder{color:#888;}
.toolbar input:focus{outline:none;border-color:#e94560;}
button{cursor:pointer;border:none;border-radius:7px;font-weight:bold;transition:.2s;}
.btn-add{background:#e94560;color:#fff;padding:9px 14px;font-size:0.95rem;}
.btn-save{background:#27ae60;color:#fff;padding:9px 14px;font-size:0.95rem;}
.btn-reload{background:#2980b9;color:#fff;padding:9px 14px;font-size:0.95rem;}
.btn-export{background:#8e44ad;color:#fff;padding:9px 14px;font-size:0.95rem;}
.btn-import{background:#d35400;color:#fff;padding:9px 14px;font-size:0.95rem;}
button:hover{filter:brightness(.88);}

/* ── STATUS ── */
#status{padding:7px 14px;font-size:0.9rem;min-height:30px;background:#1a1a2e;color:#aaa;border-bottom:1px solid #2a2a4a;}
#status.ok{color:#2ecc71;}#status.err{color:#e74c3c;}#status.loading{color:#f39c12;}

/* ── SEARCH ── */
.search-bar{padding:9px 14px;background:#16213e;border-bottom:1px solid #2a2a4a;display:flex;gap:8px;align-items:center;}
.search-bar input{flex:1;padding:9px 13px;border:1px solid #2a2a4a;border-radius:7px;background:#0f3460;color:#eee;font-size:0.95rem;}
.search-bar input:focus{outline:none;border-color:#e94560;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.95rem;}
thead th{padding:10px;text-align:left;color:#e94560;border-bottom:2px solid #e94560;font-size:1rem;background:#0f3460;white-space:nowrap;}
tbody tr{border-bottom:1px solid #2a2a4a;transition:background .15s;}
tbody tr:hover{background:#1e1e3a;}
tbody td{padding:9px 9px;vertical-align:middle;}
.editable{background:transparent;border:none;color:#eee;font-size:0.95rem;width:100%;font-family:Arial,sans-serif;padding:3px 5px;border-radius:4px;}
.editable:focus{outline:1px solid #e94560;background:#0f3460;}
.pw-wrap{display:flex;align-items:center;gap:3px;}
.small-btn{background:none;border:1px solid #2a2a4a;color:#aaa;padding:3px 7px;font-size:0.78rem;border-radius:4px;}
.small-btn:hover{border-color:#e94560;color:#e94560;}
.btn-del{background:none;border:1px solid #e94560;color:#e94560;padding:5px 10px;font-size:0.82rem;border-radius:5px;}
.btn-del:hover{background:#e94560;color:#fff;}
.empty-msg{text-align:center;padding:50px;color:#555;}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:8888;}
.modal{background:#16213e;border:2px solid #e94560;border-radius:14px;padding:28px;max-width:340px;width:90%;text-align:center;}
.modal h3{color:#e94560;margin-bottom:16px;}
.modal input{width:100%;padding:10px 12px;border-radius:7px;border:1px solid #2a2a4a;background:#0f3460;color:#eee;font-size:0.9rem;margin-bottom:10px;}
.modal input:focus{outline:none;border-color:#e94560;}
.modal-btns{display:flex;gap:8px;margin-top:8px;}
.modal-btns button{flex:1;padding:9px;}
.btn-ok{background:#27ae60;color:#fff;}
.btn-cancel{background:#555;color:#fff;}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:9px 20px;border-radius:20px;font-size:0.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;}
#toast.show{opacity:1;}

/* ── MOBILE ── */
@media(max-width:600px){
  .toolbar input{min-width:100%;}
  .btn-add,.btn-save,.btn-reload,.btn-export,.btn-import{width:100%;padding:11px;}
  #quicklinks a{font-size:0.74rem;}
}
</style>
</head>
<body>

<!-- IMPORT MODAL -->
<div class="modal-bg" id="import-modal" style="display:none">
  <div class="modal">
    <h3>📥 CSV Import</h3>
    <p style="color:#aaa;font-size:.82rem;margin-bottom:12px;">ফরম্যাট: <b>#, Company, Username, Password, Note</b><br>Header row থাকলে skip হবে।</p>
    <input type="file" id="csv-file" accept=".csv" style="color:#eee;margin-bottom:10px;" />
    <div id="import-err" style="color:#e94560;font-size:.82rem;min-height:18px;"></div>
    <div class="modal-btns">
      <button class="btn-ok" onclick="doImportCSV()">📥 Import</button>
      <button class="btn-cancel" onclick="closeModal('import-modal')">❌ বাতিল</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="sticky-top">
  <header>
    <div class="header-top">
      <div>
        <h1>🗂️ USER PW LIST V.1</h1>
        <div class="byline">Created by <b>Idris Mansoor</b> &nbsp;|&nbsp; Google Sheets সংযুক্ত</div>
      </div>
      <div class="header-right">
        <button class="icon-btn" onclick="document.getElementById('import-modal').style.display='flex'">📥 CSV Import</button>
        <button class="icon-btn" onclick="exportCSV()">📤 CSV Export</button>
      </div>
    </div>
    <!-- QUICK LINKS -->
    <div id="quicklinks">
      <span>🔗</span>
      <a href="https://www.gulftainer.com/container-tracking/" target="_blank">📦 Container Tracking</a>
      <a href="https://tos.gulftainer.com/" target="_blank">🚢 TOS Gulftainer</a>
      <a href="https://eservices.gulftainer.com/a/e-token-generator/login" target="_blank">🎫 E-Token</a>
      <a href="https://customer-registration.gulftainer.com/home" target="_blank">📋 Customer Reg.</a>
    </div>
  </header>

  <div class="toolbar">
    <input type="text" id="inp-company" placeholder="🏢 কোম্পানি" autocomplete="off" />
    <input type="text" id="inp-user" placeholder="👤 User Name" autocomplete="off" />
    <input type="text" id="inp-pw" placeholder="🔑 Password" autocomplete="new-password" />
    <input type="text" id="inp-note" placeholder="📝 Note" autocomplete="off" />
    <button class="btn-add" onclick="addRow()">➕ যোগ করুন</button>
    <button class="btn-save" onclick="saveToSheets()">💾 Save</button>
    <button class="btn-reload" onclick="loadFromSheets()">🔄 Reload</button>
  </div>

  <div id="status" class="loading">⏳ লোড হচ্ছে...</div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="🔍 কোম্পানি বা username খুঁজুন..." oninput="renderTable()" autocomplete="off" />
    <button class="icon-btn" onclick="document.getElementById('search').value='';renderTable();" style="white-space:nowrap;">✖ Clear</button>
  </div>
</div><!-- end sticky-top -->

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th><th>কোম্পানি</th><th>User Name</th>
        <th>Password</th><th>Note</th><th>মুছুন</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty-msg" class="empty-msg" style="display:none">কোনো entry নেই।</div>
</div>

<div id="toast"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxX9odOf2AKtPFVLylDTfCyjbbdPPekNyx-Baeo2o5-QcOgZo-X6kpTOBjCOHv7vxMl_Q/exec";
let rows=[];

// Back button fix
history.pushState({page:1},null,location.href);
window.addEventListener('popstate',function(){
  history.pushState({page:1},null,location.href);
  if(document.activeElement&&document.activeElement!==document.body)document.activeElement.blur();
});

async function loadFromSheets(){
  setStatus("⏳ Google Sheets থেকে load হচ্ছে...","loading");
  try{
    const res=await fetch(API_URL,{redirect:"follow"});
    const data=await res.json();
    if(data.status==="ok"){
      rows=data.rows;
      localStorage.setItem("tosKhoBackup",JSON.stringify(rows));
      setStatus("✅ "+rows.length+" টি entry load হয়েছে — Google Sheets সংযুক্ত","ok");
    }else throw new Error();
  }catch(e){
    const b=localStorage.getItem("tosKhoBackup");
    if(b){rows=JSON.parse(b);setStatus("⚠️ Sheets ব্যর্থ — local backup: "+rows.length+" entry","err");}
    else{rows=[];setStatus("⚠️ Sheets সংযোগ ব্যর্থ","err");}
  }
  renderTable();
}

async function saveToSheets(){
  setStatus("⏳ Save হচ্ছে...","loading");
  try{
    const res=await fetch(API_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"save",rows:rows.map((r,i)=>[i+1,r.company,r.user,r.password,r.note])})});
    const data=await res.json();
    if(data.status==="ok"){
      localStorage.setItem("tosKhoBackup",JSON.stringify(rows));
      setStatus("✅ "+rows.length+" টি entry save হয়েছে!","ok");toast("💾 Save সফল!");
    }else throw new Error();
  }catch(e){
    localStorage.setItem("tosKhoBackup",JSON.stringify(rows));
    setStatus("⚠️ Sheets save ব্যর্থ — local এ save হয়েছে","err");
  }
}

function addRow(){
  const c=document.getElementById("inp-company").value.trim();
  const u=document.getElementById("inp-user").value.trim();
  const p=document.getElementById("inp-pw").value.trim();
  const n=document.getElementById("inp-note").value.trim();
  if(!c&&!u){setStatus("❌ কোম্পানি বা username দিন!","err");return;}
  rows.push({company:c,user:u,password:p,note:n});
  ["inp-company","inp-user","inp-pw","inp-note"].forEach(id=>document.getElementById(id).value="");
  renderTable();setStatus("✅ যোগ হয়েছে! 💾 Save করুন।","ok");toast("✅ Entry যোগ হয়েছে!");
}

function deleteRow(i){
  if(!confirm("এই entry মুছবেন?"))return;
  rows.splice(i,1);renderTable();setStatus("🗑️ মুছে গেছে। 💾 Save করুন।","ok");
}

function editField(i,f,v){rows[i][f]=v;}

function copyText(t){navigator.clipboard.writeText(t).then(()=>toast("📋 Copied!"));}

function exportCSV(){
  if(!rows.length){toast("⚠️ কোনো data নেই!");return;}
  const csv=["#,Company,Username,Password,Note",
    ...rows.map((r,i)=>[i+1,`"${r.company}"`,`"${r.user}"`,`"${r.password}"`,`"${r.note}"`].join(","))].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download="user-pw-list-v1.csv";a.click();toast("📤 CSV export হয়েছে!");
}

function doImportCSV(){
  const file=document.getElementById("csv-file").files[0];
  const errEl=document.getElementById("import-err");
  if(!file){errEl.textContent="❌ CSV ফাইল বেছে নিন!";return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const lines=e.target.result.split("\n").map(l=>l.trim()).filter(l=>l);
    let imported=0;
    lines.forEach((line,idx)=>{
      if(idx===0&&(line.toLowerCase().startsWith("#")||line.toLowerCase().includes("company")))return;
      const cols=line.split(",").map(c=>c.replace(/^"|"$/g,"").trim());
      if(cols.length<2)return;
      rows.push({company:cols[1]||cols[0]||"",user:cols[2]||"",password:cols[3]||"",note:cols[4]||""});
      imported++;
    });
    renderTable();closeModal("import-modal");
    document.getElementById("csv-file").value="";
    setStatus("✅ "+imported+" টি import হয়েছে। 💾 Save করুন।","ok");
    toast("📥 "+imported+" টি entry import হয়েছে!");
  };
  reader.readAsText(file,"UTF-8");
}

function closeModal(id){document.getElementById(id).style.display="none";}

function renderTable(){
  const q=document.getElementById("search").value.toLowerCase();
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  const filtered=rows.map((r,i)=>({...r,_i:i}))
    .filter(r=>!q||r.company.toLowerCase().includes(q)||r.user.toLowerCase().includes(q)||r.password.toLowerCase().includes(q)||r.note.toLowerCase().includes(q));
  document.getElementById("empty-msg").style.display=filtered.length===0?"block":"none";
  filtered.forEach((r,fi)=>{
    const i=r._i;
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td style="color:#aaa;font-size:0.95rem;width:30px">${fi+1}</td>
      <td><input class="editable" value="${esc(r.company)}" oninput="editField(${i},'company',this.value)" autocomplete="off"/></td>
      <td><div class="pw-wrap">
        <input class="editable" value="${esc(r.user)}" oninput="editField(${i},'user',this.value)" autocomplete="off" style="min-width:90px"/>
        <button class="small-btn" onclick="copyText('${esc(r.user)}')" title="Copy">📋</button>
      </div></td>
      <td><div class="pw-wrap">
        <input class="editable" value="${esc(r.password)}" oninput="editField(${i},'password',this.value)" autocomplete="off" style="min-width:100px;font-family:monospace;"/>
        <button class="small-btn" onclick="copyText('${esc(r.password)}')" title="Copy">📋</button>
      </div></td>
      <td><input class="editable" value="${esc(r.note)}" oninput="editField(${i},'note',this.value)" autocomplete="off"/></td>
      <td><button class="btn-del" onclick="deleteRow(${i})">🗑️</button></td>`;
    tbody.appendChild(tr);
  });
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/'/g,"&#39;");}
function setStatus(m,t){const el=document.getElementById("status");el.textContent=m;el.className=t||"";}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}

loadFromSheets();
</script>
</body>
</html>
