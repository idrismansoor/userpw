<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>TOS KHOR</title>
</head>
<body class="bg-gray-50 p-6">
    <!-- আপনার হেডার কোড এখানে থাকবে -->
    <!-- (আগের দেওয়া হেডার কোডটি এখানে বসান) -->

    <!-- টেবিল সেকশন -->
    <div class="max-w-6xl mx-auto mt-10">
        <div class="bg-white shadow rounded-lg overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b">
                    <tr><th class="p-4">Company Name</th><th class="p-4">Username</th><th class="p-4">Password</th><th class="p-4">Notes</th><th class="p-4">Actions</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "আপনার_নতুন_লিঙ্কটি_এখানে_দিন";

        async function loadData() {
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = data.rows.map(r => `
                    <tr class="border-b">
                        <td class="p-4"><input value="${r.company}" class="c w-full p-1 border"></td>
                        <td class="p-4"><input value="${r.user}" class="u w-full p-1 border"></td>
                        <td class="p-4"><input value="${r.password}" class="p w-full p-1 border"></td>
                        <td class="p-4"><input value="${r.note}" class="n w-full p-1 border"></td>
                        <td class="p-4"><button onclick="this.closest('tr').remove()" class="text-red-600 font-bold">Delete</button></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error("ডাটা লোড হয়নি:", e);
            }
        }

        // পেজ লোড হলেই ডাটা লোড হবে
        window.onload = loadData;
    </script>
</body>
</html>
