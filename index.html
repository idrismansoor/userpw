<!DOCTYPE html>
<html>
<head>
    <title>Credentials Manager</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        input { width: 90%; }
        button { padding: 10px 20px; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <button onclick="loadData()">Sync Data</button>
    <button onclick="saveData()">Save All Changes</button>
    <table>
        <thead><tr><th>SL</th><th>Company</th><th>User</th><th>Password</th><th>Note</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz-sSfP6nEYYBRZH-trkbhPvaW4HzzZAiGImQFuVJum5nFYr18Jouw0DPSgWb-EtMqafA/exec";

        async function loadData() {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            renderTable(data.rows);
        }

        function renderTable(rows) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = rows.map((r, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td><input value="${r.company}" id="comp_${i}"></td>
                    <td><input value="${r.user}" id="user_${i}"></td>
                    <td><input value="${r.password}" id="pass_${i}"></td>
                    <td><input value="${r.note}" id="note_${i}"></td>
                </tr>
            `).join('');
        }

        async function saveData() {
            const rows = [];
            document.querySelectorAll('#tableBody tr').forEach((tr, i) => {
                rows.push({
                    company: document.getElementById('comp_'+i).value,
                    user: document.getElementById('user_'+i).value,
                    password: document.getElementById('pass_'+i).value,
                    note: document.getElementById('note_'+i).value
                });
            });
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({action: 'save', rows})
            });
            alert('Saved Successfully!');
        }
    </script>
</body>
</html>
